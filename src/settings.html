<!DOCTYPE html>
<html lang="en" data-theme="crt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow: auto; cursor: default; }
    body {
      background: var(--backdrop);
      color: var(--fg);
      padding: 22px 24px 28px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--accent);
    }
    [data-theme="crt"] h1 { color: var(--fg); text-shadow: 0 0 8px var(--card-glow); }
    .field { margin-bottom: 16px; }
    label.lbl { display: block; font-size: 13px; color: var(--fg-dim); margin-bottom: 6px; letter-spacing: .5px; }
    input[type="text"], input[type="number"], select {
      width: 100%;
      font-family: var(--font-pixel);
      font-size: 15px;
      padding: 9px 10px;
      color: var(--fg);
      background: var(--btn-bg);
      border: 2px solid var(--card-border, var(--fg-dim));
      border-radius: 6px;
      outline: none;
    }
    [data-theme="crt"] input, [data-theme="crt"] select { border-color: var(--fg-dim); }
    input:focus, select:focus { border-color: var(--fg); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .radios, .seg { display: flex; gap: 8px; flex-wrap: wrap; }
    .seg label {
      flex: 1; text-align: center; font-size: 13px; padding: 8px 6px;
      border: 2px solid var(--fg-dim); border-radius: 6px; cursor: pointer; color: var(--fg-dim);
    }
    .seg input { display: none; }
    .seg input:checked + span { color: var(--fg); }
    .seg label:has(input:checked) { border-color: var(--fg); color: var(--fg); background: var(--btn-bg-hover); }
    .actions { display: flex; gap: 12px; margin-top: 22px; }
    .actions .btn { flex: 1; font-size: 16px; padding: 12px; }
    .hint { font-size: 11px; color: var(--fg-dim); margin-top: 4px; opacity: .8; }
    .statusbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 18px;
      border: 2px solid var(--fg-dim); border-radius: 8px;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--fg);
           box-shadow: 0 0 8px var(--card-glow); flex: 0 0 auto; }
    .statusbar.paused .dot { background: var(--fg-dim); box-shadow: none; }
    #statusText { font-size: 14px; letter-spacing: .5px; }
    .statusbar .btn { margin-left: auto; font-size: 13px; padding: 7px 16px; }
    .stat-line {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; margin-bottom: 18px;
      border: 2px dashed var(--fg-dim); border-radius: 8px;
      font-size: 13px; color: var(--fg-dim); letter-spacing: .3px;
    }
    .stat-line strong { color: var(--fg); font-weight: normal; }
    .pomo-status {
      display: none; /* JS shows this when mode=pomodoro */
      flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 12px; margin-bottom: 18px;
      border: 2px solid var(--fg-dim); border-radius: 8px;
    }
    .pomo-status.show { display: flex; }
    .pomo-phase { font-size: 13px; letter-spacing: 1px; color: var(--fg-dim); text-transform: uppercase; }
    .pomo-clock { font-size: 34px; font-family: var(--font-pixel); color: var(--fg); }
    [data-theme="crt"] .pomo-clock { text-shadow: 0 0 8px var(--card-glow); }
    .pomo-dots { display: flex; gap: 6px; margin-top: 2px; }
    .pomo-dots .d { width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--fg-dim); }
    .pomo-dots .d.filled { background: var(--fg); border-color: var(--fg); }
    .pomo-today { font-size: 11px; color: var(--fg-dim); margin-top: 2px; }
    /* Simple mode is the default; JS flips this if load_config resolves to
       pomodoro. Keeps a failed config load showing one coherent field set
       instead of both stacked. */
    #pomodoroFields { display: none; }
  </style>
</head>
<body>
  <h1>⧗ Hourglass Settings</h1>

  <div class="statusbar" id="statusbar">
    <span class="dot"></span>
    <span id="statusText">Running</span>
    <button class="btn btn-ghost" id="pauseBtn">Pause</button>
  </div>

  <div class="stat-line">⏱ Screen time today: <strong id="screenTimeStat">—</strong></div>

  <div class="pomo-status" id="pomoStatus">
    <span class="pomo-phase" id="pomoPhase">Working</span>
    <span class="pomo-clock" id="pomoClock">25:00</span>
    <span class="pomo-dots" id="pomoDots"></span>
    <span class="pomo-today" id="pomoToday">0 pomodoros today</span>
  </div>

  <div class="field">
    <label class="lbl">Mode</label>
    <div class="seg" id="mode">
      <label><input type="radio" name="mode" value="simple" /><span>Simple</span></label>
      <label><input type="radio" name="mode" value="pomodoro" /><span>Pomodoro</span></label>
    </div>
  </div>

  <div id="simpleFields">
    <div class="row">
      <div class="field">
        <label class="lbl" for="work">Time between breaks (minutes)</label>
        <input type="number" id="work" min="0.1" step="0.1" />
      </div>
      <div class="field">
        <label class="lbl" for="brk">Break length (seconds)</label>
        <input type="number" id="brk" min="1" step="1" />
      </div>
    </div>
  </div>

  <div id="pomodoroFields">
    <div class="row">
      <div class="field">
        <label class="lbl" for="pomoWork">Work session (minutes)</label>
        <input type="number" id="pomoWork" min="1" step="1" />
      </div>
      <div class="field">
        <label class="lbl" for="pomoShort">Short break (minutes)</label>
        <input type="number" id="pomoShort" min="0.1" step="0.1" />
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label class="lbl" for="pomoLong">Long break (minutes)</label>
        <input type="number" id="pomoLong" min="0.1" step="0.1" />
      </div>
      <div class="field">
        <label class="lbl" for="pomoCycles">Work sessions before long break</label>
        <input type="number" id="pomoCycles" min="1" step="1" />
      </div>
    </div>
  </div>

  <div class="field">
    <label class="lbl">Bottom line content</label>
    <div class="seg" id="content">
      <label><input type="radio" name="content" value="both" /><span>Both</span></label>
      <label><input type="radio" name="content" value="factoids" /><span>Factoids</span></label>
      <label><input type="radio" name="content" value="quotes" /><span>Quotes</span></label>
    </div>
  </div>

  <div class="field">
    <label class="lbl" for="theme">Theme</label>
    <select id="theme">
      <option value="crt">CRT green (minimalist)</option>
      <option value="dark">Dark (arcade)</option>
      <option value="light">Light</option>
    </select>
  </div>

  <div class="field">
    <label class="lbl" for="heading">Heading message</label>
    <input type="text" id="heading" />
  </div>
  <div class="field">
    <label class="lbl" for="bodymsg">Body message</label>
    <input type="text" id="bodymsg" />
  </div>
  <div class="field">
    <label class="lbl" for="quitmsg">"Done" button label</label>
    <input type="text" id="quitmsg" />
  </div>

  <div class="actions">
    <button class="btn btn-ghost" id="cancel">Close</button>
    <button class="btn btn-primary" id="save">Save</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
