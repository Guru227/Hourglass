<!DOCTYPE html>
<html lang="en" data-theme="crt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow: auto; cursor: default; }
    body {
      background: var(--backdrop);
      color: var(--fg);
      padding: 22px 24px 28px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--accent);
    }
    [data-theme="crt"] h1 { color: var(--fg); text-shadow: 0 0 8px var(--card-glow); }
    .field { margin-bottom: 16px; }
    label.lbl { display: block; font-size: 13px; color: var(--fg-dim); margin-bottom: 6px; letter-spacing: .5px; }
    input[type="text"], input[type="number"], select {
      width: 100%;
      font-family: var(--font-pixel);
      font-size: 15px;
      padding: 9px 10px;
      color: var(--fg);
      background: var(--btn-bg);
      border: 2px solid var(--card-border, var(--fg-dim));
      border-radius: 6px;
      outline: none;
    }
    [data-theme="crt"] input, [data-theme="crt"] select { border-color: var(--fg-dim); }
    input:focus, select:focus { border-color: var(--fg); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .radios, .seg { display: flex; gap: 8px; flex-wrap: wrap; }
    .seg label {
      flex: 1; text-align: center; font-size: 13px; padding: 8px 6px;
      border: 2px solid var(--fg-dim); border-radius: 6px; cursor: pointer; color: var(--fg-dim);
    }
    .seg input { display: none; }
    .seg input:checked + span { color: var(--fg); }
    .seg label:has(input:checked) { border-color: var(--fg); color: var(--fg); background: var(--btn-bg-hover); }
    .actions { display: flex; gap: 12px; margin-top: 22px; }
    .actions .btn { flex: 1; font-size: 16px; padding: 12px; }
    .hint { font-size: 11px; color: var(--fg-dim); margin-top: 4px; opacity: .8; }
  </style>
</head>
<body>
  <h1>⧗ Hourglass Settings</h1>

  <div class="row">
    <div class="field">
      <label class="lbl" for="work">Time between breaks (minutes)</label>
      <input type="number" id="work" min="0.1" step="0.1" />
    </div>
    <div class="field">
      <label class="lbl" for="brk">Break length (seconds)</label>
      <input type="number" id="brk" min="1" step="1" />
    </div>
  </div>

  <div class="field">
    <label class="lbl">Bottom line content</label>
    <div class="seg" id="content">
      <label><input type="radio" name="content" value="both" /><span>Both</span></label>
      <label><input type="radio" name="content" value="factoids" /><span>Factoids</span></label>
      <label><input type="radio" name="content" value="quotes" /><span>Quotes</span></label>
    </div>
  </div>

  <div class="field">
    <label class="lbl" for="theme">Theme</label>
    <select id="theme">
      <option value="crt">CRT green (minimalist)</option>
      <option value="dark">Dark (arcade)</option>
      <option value="light">Light</option>
    </select>
  </div>

  <div class="field">
    <label class="lbl" for="heading">Heading message</label>
    <input type="text" id="heading" />
  </div>
  <div class="field">
    <label class="lbl" for="bodymsg">Body message</label>
    <input type="text" id="bodymsg" />
  </div>
  <div class="row">
    <div class="field">
      <label class="lbl" for="quitmsg">"Done" button label</label>
      <input type="text" id="quitmsg" />
    </div>
    <div class="field">
      <label class="lbl" for="termsg">"Stop" button label</label>
      <input type="text" id="termsg" />
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-ghost" id="cancel">Close</button>
    <button class="btn btn-primary" id="save">Save</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
