<!DOCTYPE html>
<html lang="en" data-theme="crt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Full-screen space-grey wash that takes over the whole display -->
  <div id="overlay" class="overlay">
    <div class="card" role="dialog" aria-label="Break reminder">

      <!-- Hourglass at the top center -->
      <div class="center-stage">
        <canvas id="hourglass" width="120" height="170" aria-hidden="true"></canvas>
      </div>

      <!-- Middle: exercise sprite | text | exercise sprite -->
      <div class="hero">
        <canvas class="sprite" id="spriteLeft" width="160" height="220" aria-hidden="true"></canvas>

        <div class="text">
          <h1 id="heading" class="heading">Up you go!</h1>
          <p id="body" class="body">Time to stretch</p>
        </div>

        <canvas class="sprite" id="spriteRight" width="160" height="220" aria-hidden="true"></canvas>
      </div>

      <!-- Buttons -->
      <div class="buttons">
        <button id="quitBtn" class="btn btn-primary" disabled>
          <span id="quitLabel">I'm Done stretching!</span>
          <span id="countdown" class="countdown"></span>
        </button>
        <button id="terminateBtn" class="btn btn-ghost">Stop the timer</button>
      </div>

      <!-- Bottom: rotating factoid / quote -->
      <p id="factoid" class="factoid"></p>

      <div class="scanlines" aria-hidden="true"></div>
      <div class="crt-flicker" aria-hidden="true"></div>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="sprites.js"></script>
  <script src="main.js"></script>
</body>
</html>
